name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Test and build
        run: ./gradlew clean test bootJar --no-daemon

      - name: Prepare deployment artifact
        run: |
          mkdir -p build/deploy
          jar_path="$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' -print -quit)"
          test -n "$jar_path"
          cp "$jar_path" build/deploy/mjuton.jar
          cd build/deploy
          sha256sum mjuton.jar > mjuton.jar.sha256

      - name: Publish deployment artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view deploy-latest >/dev/null 2>&1; then
            gh release create deploy-latest \
              --target "$GITHUB_SHA" \
              --title "MJUTON deployment artifact" \
              --notes "Automated deployment artifact for the production EC2 instance." \
              --prerelease
          fi

          gh release upload deploy-latest \
            build/deploy/mjuton.jar \
            build/deploy/mjuton.jar.sha256 \
            --clobber

      - name: Verify deployed artifact
        run: |
          expected="$(cut -d ' ' -f 1 build/deploy/mjuton.jar.sha256)"

          for attempt in $(seq 1 30); do
            deployed="$(curl -fsS --max-time 5 http://52.78.186.220/deploy-version || true)"
            health="$(curl -fsS --max-time 5 http://52.78.186.220/api/health || true)"

            if [ "$deployed" = "$expected" ] && echo "$health" | grep -q '"status":"ok"'; then
              exit 0
            fi

            sleep 5
          done

          echo "The EC2 instance did not report the expected artifact checksum." >&2
          exit 1
