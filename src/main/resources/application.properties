spring.application.name=mju-ton
server.port=8080
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mjuton}
spring.datasource.username=${DB_USERNAME:mjuton}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.with-credentials=true
mjuton.cors.allowed-origins=${MJUTON_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
mjuton.mail.enabled=${MJUTON_MAIL_ENABLED:false}
mjuton.mail.from=${MJUTON_MAIL_FROM:${SPRING_MAIL_USERNAME:no-reply@mjuton.local}}
