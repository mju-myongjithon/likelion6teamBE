# 로컬 수동 테스트용 프로필. Docker/PostgreSQL 없이 H2 인메모리로 앱을 띄운다.
# 실행: ./gradlew bootRun --args='--spring.profiles.active=dev'
spring.datasource.url=jdbc:h2:mem:mjuton;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# 앱이 직접 서빙하는 테스트 페이지(http://localhost:8080/chat-test.html)의 WebSocket 핸드셰이크를 허용한다.
chat.allowed-origins=http://localhost:5173,http://localhost:8080
